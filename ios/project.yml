name: ListBlitz
options:
  bundleIdPrefix: io.listblitz
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    INFOPLIST_KEY_CFBundleDisplayName: "ListBlitz"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.business"
    INFOPLIST_KEY_NSCameraUsageDescription: "ListBlitz uses your camera to create listings from photos"
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "ListBlitz needs access to your photos to create listings"

targets:
  ListBlitz:
    type: application
    platform: iOS
    sources:
      - path: ListBlitz
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: ListBlitz/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: ListBlitz/ListBlitz.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.listblitz.app
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.listblitz.app
  ListBlitzTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ListBlitzTests
    dependencies:
      - target: ListBlitz
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ListBlitz.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ListBlitz"
        BUNDLE_LOADER: "$(TEST_HOST)"
