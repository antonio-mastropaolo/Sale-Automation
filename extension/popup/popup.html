<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafaf9;
      color: #1c1917;
    }
    .header {
      padding: 16px;
      background: linear-gradient(135deg, #0d9488, #0f766e);
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .logo {
      width: 32px; height: 32px; background: rgba(255,255,255,0.2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; }
    .platforms { padding: 12px; }
    .platform {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border-radius: 10px; margin-bottom: 6px;
      border: 1px solid #e7e5e4; background: white;
      cursor: pointer; transition: all 0.15s;
    }
    .platform:hover { border-color: #0d9488; }
    .platform .icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white;
    }
    .platform .info { flex: 1; }
    .platform .name { font-size: 13px; font-weight: 600; }
    .platform .status { font-size: 11px; margin-top: 2px; }
    .platform .status.connected { color: #059669; }
    .platform .status.disconnected { color: #78716c; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.on { background: #10b981; }
    .dot.off { background: #d6d3d1; }
    .footer {
      padding: 12px; border-top: 1px solid #e7e5e4;
      text-align: center; font-size: 11px; color: #78716c;
    }
    .footer a { color: #0d9488; text-decoration: none; }
    .btn-connect {
      font-size: 11px; font-weight: 600; padding: 4px 10px;
      border-radius: 6px; border: 1px solid #e7e5e4;
      background: white; cursor: pointer; color: #0d9488;
    }
    .btn-connect:hover { background: #f0fdfa; }
    .loading { text-align: center; padding: 20px; color: #78716c; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div>
      <h1>ListBlitz</h1>
      <p>Cross-platform publishing</p>
    </div>
  </div>
  <div class="platforms" id="platforms">
    <div class="loading">Checking connections...</div>
  </div>
  <div class="footer">
    <a href="http://localhost:3000" target="_blank">Open ListBlitz Dashboard</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
